<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horus AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    /* Background blobs */
    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.6;
      animation: float 12s infinite alternate ease-in-out;
    }

    .blob1 {
      background: radial-gradient(circle, rgba(99,102,241,0.6), transparent 70%);
      top: 10%;
      left: 15%;
    }

    .blob2 {
      background: radial-gradient(circle, rgba(34,197,94,0.5), transparent 70%);
      bottom: 10%;
      right: 15%;
    }

    @keyframes float {
      from { transform: translate(0, 0); }
      to { transform: translate(120px, -80px); }
    }

    /* App container */
    .app {
      position: relative;
      width: 95%;
      max-width: 900px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 80px rgba(0,0,0,0.7);
      overflow: hidden;
    }

    .header {
      padding: 18px;
      text-align: center;
      font-weight: 600;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }
      
    /* Chat area */
    .chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    } 
    
    /* Messages */
    .message {
      padding: 14px 16px;
      border-radius: 14px;
      max-width: 75%;
      font-size: 14px;
      line-height: 1.5;
      backdrop-filter: blur(12px);
      animation: fadeIn 0.25s ease;
      white-space: pre-wrap;
    }
      
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    } 
    
    .user {  
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(99,102,241,0.9), rgba(59,130,246,0.7));
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 20px rgba(99,102,241,0.3);
    }
      
    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.04);
    }
      
    /* Input area */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(20px);
    }
      
    input {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      outline: none;
      background: rgba(255,255,255,0.05);
      color: white;
      transition: 0.2s;
    }
  
    input:focus {
      border-color: rgba(99,102,241,0.6);
      box-shadow: 0 0 12px rgba(99,102,241,0.3);
    }
    
    button {
      padding: 14px 18px;   
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 0 20px rgba(34,197,94,0.3);  
      transition: 0.2s;
    }
      
    button:hover {
      transform: translateY(-1px) scale(1.04);
      box-shadow: 0 0 30px rgba(34,197,94,0.5);
    }
     
    .loading {
      opacity: 0.6;
      font-style: italic;
    }
  </style>
</head>
      
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
     
  <div class="app">
    <div class="header">⚡ HORUS AI — PRIVATE ANALYTICS</div>
      
    <div id="chat" class="chat"></div>
    
    <div class="input-area">
      <input id="input" type="text" placeholder="Ask anything..." />
      <button onclick="send()">Send</button>
    </div>
  </div>
      
  <script>
    const chat = document.getElementById("chat");
        
    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = `message ${type}`;
      div.innerText = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
        
    function addLoading() {
      const div = document.createElement("div");
      div.className = "message bot loading";
      div.id = "loading";
      div.innerText = "Analyzing signals...";
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    } 
      
    function removeLoading() {
      const el = document.getElementById("loading");
      if (el) el.remove();
    }
  
    async function send() {
      const input = document.getElementById("input");
      const text = input.value;
    
      if (!text) return;
      
      addMessage(text, "user");
      input.value = "";
  
      addLoading();
  
      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });
     
        const data = await res.json();
    
        removeLoading();

        // ✅ FIXED RESPONSE HANDLING
        if (data.success) {
          const result = data.data;

          const formatted = `
Sentiment: ${result.sentiment}

Summary:
${result.summary}

Market Odds: ${result.signals.marketOdds}
News Sentiment: ${result.signals.newsSentiment}
Developer Activity: ${result.signals.developerActivity}

Analysis:
${result.analysis}

Risks:
- ${result.risks.join("\n- ")}
          `;

          addMessage(formatted, "bot");
        } else {
          addMessage(data.error || "Error", "bot");
        }
      
      } catch (err) {
        removeLoading();
        addMessage("Request failed", "bot");
      }
    }
  </script>
      
</body>
</html>
